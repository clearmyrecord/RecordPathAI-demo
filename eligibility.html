<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eligibility - ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="form-card">
    <h1>Check Your Eligibility</h1>

    <div class="form-grid">

      <div class="form-field">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" />
      </div>

      <div class="form-field">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" />
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" />
      </div>

      <div class="form-field">
        <label for="phone">Phone</label>
        <input type="text" id="phone" />
      </div>

      <div class="form-field">
        <label for="charge">Select Charge</label>
        <select id="charge"></select>
      </div>

      <!-- 🔥 MAILING ADDRESS -->
      <h3>Mailing Address</h3>

      <div class="form-field">
        <label for="mailingStreet">Street Address</label>
        <input type="text" id="mailingStreet" />
      </div>

      <div class="form-field">
        <label for="mailingCity">City</label>
        <input type="text" id="mailingCity" />
      </div>

      <div class="form-field">
        <label for="mailingState">State</label>
        <input type="text" id="mailingState" />
      </div>

      <div class="form-field">
        <label for="mailingZip">ZIP Code</label>
        <input type="text" id="mailingZip" />
      </div>

    </div>

    <div class="form-actions">
      <button type="button" id="nextBtn">Next</button>
    </div>
  </main>

  <script src="js/charges.js"></script>
  <script src="intake.js"></script>

</body>
</html>
