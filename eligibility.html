<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Your Free Eligibility Check - ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css?v=5" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">ClearMyRecord</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="how-it-works.html">How It Works</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="progress-wrap">
      <div class="progress-pill">Step 1 of 3</div>
    </div>

    <section class="card form-card">
      <h1>Start your free eligibility check</h1>
      <p class="supporting-text">
        Enter your details below to begin.
      </p>

      <form id="leadForm" class="form-grid">
        <div class="form-field">
          <label for="fullName">Full name</label>
          <input id="fullName" type="text" placeholder="Your full name" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-field">
          <label for="state">State</label>
          <select id="state" required>
            <option value="">Select a state</option>
            <option value="ohio">Ohio</option>
            <option value="nevada">Nevada</option>
          </select>
        </div>

        <div class="form-field">
          <label for="offense">Offense type</label>
          <select id="offense" required>
            <option value="">Select offense type</option>
            <option value="drug">Drug possession</option>
            <option value="theft">Theft</option>
            <option value="other">Other non-violent offense</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="primary-btn" onclick="goToDetails()">
            Next: Record Details
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/app.js?v=5"></script>
</body>
</html>
