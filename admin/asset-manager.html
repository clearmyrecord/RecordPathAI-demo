<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>RecordPathAI Asset Manager</title>
<style>body{font-family:Arial,sans-serif;margin:1.5rem}.warning{padding:.75rem;background:#fff3cd;border-left:4px solid #d39e00;margin-bottom:1rem}.filters{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:.5rem;margin-bottom:1rem}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:.5rem;vertical-align:top}th{background:#f3f3f3}button{margin:.1rem}.status-pill{font-weight:700}</style></head>
<body><h1>Form Review Queue</h1><div class="warning"><strong>Warning:</strong> Forms must be reviewed and mapped before activation.</div>
<div class="filters"><select id="f-state"></select><select id="f-county"></select><select id="f-courtType"></select><select id="f-status"></select><select id="f-formType"></select></div>
<table><thead><tr><th>Court</th><th>County</th><th>Court Type</th><th>Form Type</th><th>Status</th><th>Score / Signals</th><th>Links</th><th>Actions</th></tr></thead><tbody id="queue"></tbody></table>
<script>
const KEY='recordpathai-review-state-v2';let raw=[];const draftCache={};
const state=JSON.parse(localStorage.getItem(KEY)||'{}');
const getStatus=(item,i)=>state[id(item,i)]?.status||item.status||'pending_review';
const id=(item,i)=>`${item.sourceUrl||''}|${item.localPath||''}|${i}`;
function save(i,item,patch){state[id(item,i)]={...(state[id(item,i)]||{}),...patch};localStorage.setItem(KEY,JSON.stringify(state));render();}
function uniq(values){return['all',...Array.from(new Set(values.filter(Boolean))).sort()];}
function sel(id,vals){const s=document.getElementById(id);s.innerHTML=vals.map(v=>`<option value="${v}">${v}</option>`).join('');}
function slugify(v){return String(v||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function countySlug(v){const s=slugify(v); return s.endsWith('-county')?s:`${s}-county`;}
function templateBase(item){return `../templates/ohio/${countySlug(item.county)}/${item.courtType}/${item.formType}`;}
async function computeMapStatus(item){if(!item.county||!item.courtType||!item.formType) return 'No mapping'; const base=templateBase(item);if(draftCache[base]) return draftCache[base];
  try { const res = await fetch(`${base}.json`,{method:'HEAD'}); if(res.ok){draftCache[base]='Active'; return 'Active';} } catch {}
  try { const draftRes = await fetch(`${base}.draft.json`,{cache:'no-store'}); if(!draftRes.ok){draftCache[base]='No mapping'; return 'No mapping';}
    const body = await draftRes.json(); const v = body?.status==='draft_needs_review' || body?.autoGenerated; draftCache[base]=v?'Draft mapping needs review':'Mapped'; return draftCache[base];
  } catch {draftCache[base]='No mapping'; return 'No mapping';}
}
function applyFilters(items){const v=k=>document.getElementById(k).value;return items.filter((x,i)=>(v('f-state')==='all'||x.state===v('f-state'))&&(v('f-county')==='all'||x.county===v('f-county'))&&(v('f-courtType')==='all'||x.courtType===v('f-courtType'))&&(v('f-status')==='all'||getStatus(x,i)===v('f-status'))&&(v('f-formType')==='all'||(x.formType||'unknown')===v('f-formType')));} 
async function init(){raw=await (await fetch('./review-queue.json',{cache:'no-store'})).json();sel('f-state',uniq(raw.map(x=>x.state)));sel('f-county',uniq(raw.map(x=>x.county)));sel('f-courtType',uniq(raw.map(x=>x.courtType)));sel('f-status',uniq(raw.map((x,i)=>getStatus(x,i))));sel('f-formType',uniq(raw.map(x=>x.formType||'unknown')));document.querySelectorAll('select').forEach(s=>s.onchange=render);render();}
async function render(){const tb=document.getElementById('queue');tb.innerHTML='';for (const item of applyFilters(raw)){const i=raw.indexOf(item);const tr=document.createElement('tr');const status=getStatus(item,i);const mapStatus=await computeMapStatus(item);
const openPdf=(item.sourceUrl&&item.sourceUrl.toLowerCase().includes('.pdf'))?`<a href="${item.sourceUrl}" target="_blank">Open PDF</a>`:'';const openLocal=item.localPath?`<a href="../${item.localPath}" target="_blank">Open Local Copy</a>`:'';const note=item.pdfAccess==='manual_download_required'?'<div>Download from source page, then upload local copy.</div>':'';
const base=templateBase(item);
tr.innerHTML=`<td>${item.courtName||item.court||''}</td><td>${item.county||''}, ${item.state||''}</td><td>${item.courtType||''}</td><td>${item.formType||'unknown'}</td><td>${status}<br/><small class='status-pill'>${mapStatus}</small></td><td>${item.score??0}<br/><small>${(item.signals||[]).join(', ')}</small></td><td><a href="${item.sourcePageUrl||item.sourceUrl||'#'}" target="_blank">Open Source Page</a><br/>${openPdf}<br/>${openLocal}${note}</td>
<td><button data-a='approved'>Mark Approved</button><button data-a='rejected'>Mark Rejected</button><button data-a='needs_mapping'>Mark Needs Mapping</button><button data-a='copy'>Copy Metadata JSON</button><hr/><button data-a='generate_draft'>Generate Draft Mapping</button><a href="./pdf-mapper.html?draft=${encodeURIComponent(base+'.draft.json')}&final=${encodeURIComponent(base+'.json')}" target="_blank"><button type='button'>Open Draft in Mapper</button></a></td>`;
tr.querySelectorAll('button').forEach(b=>b.onclick=()=>{if(b.dataset.a==='copy'){navigator.clipboard.writeText(JSON.stringify(item,null,2));return;}if(b.dataset.a==='generate_draft'){const cmd=`node tools/auto-map-pdf.js --county=${slugify(item.county)} --courtType=${item.courtType} --formType=${item.formType}`;navigator.clipboard.writeText(cmd);alert(`Run this command in terminal:\n\n${cmd}`);return;}save(i,item,{status:b.dataset.a});});tb.appendChild(tr);} }
init();
</script></body></html>
