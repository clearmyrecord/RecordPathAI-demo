<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecordPathAI Asset Manager</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 1.5rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; vertical-align: top; }
    th { background: #f3f3f3; }
    button { margin: 0.15rem; }
    .note { margin: 1rem 0; padding: 0.75rem; border-left: 4px solid #d35400; background: #fff7ed; }
    .links a { display: inline-block; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <h1>Form Review Queue</h1>
  <div class="note">
    <strong>Important:</strong> This static prototype stores status changes in browser localStorage only.
    Production requires backend persistence and audit logging.
  </div>
  <table>
    <thead>
      <tr>
        <th>Court</th><th>County</th><th>Court Type</th><th>Links</th><th>Local PDF Path</th><th>Status</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="queue-body"></tbody>
  </table>

  <script>
    const STORAGE_KEY = 'recordpathai-review-queue-state';
    const TEMPLATE_REGISTRY_STORAGE_KEY = 'recordpathai-active-template-registry';
    const TEMPLATE_REGISTRY_URL = '../templates/index.json';

    function loadLocalState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch { return {}; }
    }

    function saveLocalState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setStatus(itemId, newStatus) {
      const state = loadLocalState();
      state[itemId] = newStatus;
      saveLocalState(state);
      render();
    }

    async function localFileExists(localPath) {
      try {
        const response = await fetch(localPath, { method: 'HEAD' });
        return response.ok;
      } catch {
        return false;
      }
    }


    function normalizeState(value) {
      const v = String(value || '').trim().toUpperCase();
      return v === 'OHIO' ? 'OH' : v;
    }

    function normalizeCounty(value) {
      return String(value || '').replace(/ county$/i, '').trim();
    }

    function inferFormType(item) {
      const name = `${item.formTitle || ''} ${item.officialListingText || ''}`.toLowerCase();
      if (name.includes('dismiss')) return 'sealing-dismissal';
      return 'sealing-conviction';
    }

    async function loadTemplateRegistry() {
      let base = [];
      try {
        const response = await fetch(TEMPLATE_REGISTRY_URL, { cache: 'no-store' });
        if (response.ok) base = await response.json();
      } catch {}

      try {
        const local = JSON.parse(localStorage.getItem(TEMPLATE_REGISTRY_STORAGE_KEY) || '[]');
        return Array.isArray(local) ? local : base;
      } catch {
        return base;
      }
    }

    function saveTemplateRegistry(registry) {
      localStorage.setItem(TEMPLATE_REGISTRY_STORAGE_KEY, JSON.stringify(registry));
    }

    async function mappingExists(item) {
      const formType = inferFormType(item);
      const mappingPath = `../templates/ohio/${normalizeCounty(item.county).toLowerCase()}-county/${formType}.json`;
      return localFileExists(mappingPath);
    }

    async function activateTemplate(item, status) {
      const approved = status === 'approved';
      const hasMapping = await mappingExists(item);
      if (!approved || !hasMapping) return;

      const registry = await loadTemplateRegistry();
      const entry = {
        state: normalizeState(item.state),
        county: normalizeCounty(item.county),
        courtType: item.courtType,
        formType: inferFormType(item),
        pdfPath: item.localPath,
        mappingPath: `templates/ohio/${normalizeCounty(item.county).toLowerCase()}-county/${inferFormType(item)}.json`,
        status: 'active'
      };

      const filtered = registry.filter((tpl) => !(
        normalizeState(tpl.state) === entry.state &&
        normalizeCounty(tpl.county).toLowerCase() === entry.county.toLowerCase() &&
        String(tpl.courtType) === entry.courtType &&
        String(tpl.formType) === entry.formType
      ));

      filtered.push(entry);
      saveTemplateRegistry(filtered);
      alert('Template activated and added to local active registry.');
      render();
    }
    async function render() {
      const response = await fetch('./review-queue.json');
      const queue = await response.json();
      const state = loadLocalState();
      const tbody = document.getElementById('queue-body');
      tbody.innerHTML = '';

      const localPathStatus = await Promise.all(queue.map((item) => localFileExists(item.localPath)));
      const mappingStatus = await Promise.all(queue.map((item) => mappingExists(item)));

      queue.forEach((item, idx) => {
        const id = `${item.court}|${item.sourceUrl}|${idx}`;
        const status = state[id] || item.status;
        const hasLocalCopy = localPathStatus[idx];
        const hasMapping = mappingStatus[idx];
        const canActivate = status === "approved" && hasMapping;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.court}</td>
          <td>${item.county}, ${item.state}</td>
          <td>${item.courtType}</td>
          <td class="links">
            ${item.pdfAccess === 'manual_download_required'
              ? '<span>Download from source page, then upload local copy</span>'
              : `<a href="${item.sourceUrl}" target="_blank" rel="noopener noreferrer">Open PDF</a>`}
            <a href="${item.sourcePageUrl}" target="_blank" rel="noopener noreferrer">Open Source Page</a>
            ${hasLocalCopy
              ? `<a href="${item.localPath}" target="_blank" rel="noopener noreferrer">Open Local Copy</a>`
              : '<span>Local copy not downloaded yet</span>'}
          </td>
          <td>${item.localPath}</td>
          <td><strong>${status}</strong></td>
          <td>
            <button data-action="approved">Approve</button>
            <button data-action="rejected">Reject</button>
            <button data-action="needs_mapping">Needs Mapping</button>
            <button data-action="activate_template">Activate Template</button>
          </td>
        `;

        tr.querySelectorAll('button').forEach((button) => {
          if (button.dataset.action === 'activate_template') {
            button.disabled = !canActivate;
            button.title = canActivate ? 'Activate this template' : 'Requires approved status and existing mapping';
            button.addEventListener('click', () => activateTemplate(item, status));
            return;
          }
          button.addEventListener('click', () => setStatus(id, button.dataset.action));
        });

        tbody.appendChild(tr);
      });
    }

    render();
  </script>
</body>
</html>
