<!doctype html><html><head><meta charset='utf-8'><title>PDF Draft Mapper</title><style>body{font-family:Arial;margin:20px}textarea{width:100%;height:70vh}button{margin-right:.5rem}</style></head><body>
<h1>PDF Mapper (Draft Review)</h1>
<p>Load a <code>.draft.json</code>, review/edit, then save as final <code>.json</code>.</p>
<div><button id='loadDraft'>Load Draft</button><button id='saveFinal'>Save Final .json</button><span id='status'></span></div>
<textarea id='editor'></textarea>
<script>
const qs = new URLSearchParams(location.search);
const draft = qs.get('draft');
const finalPath = qs.get('final') || 'mapping.json';
const editor = document.getElementById('editor');
const status = document.getElementById('status');
async function loadDraft(){
  if(!draft){status.textContent='No draft URL provided.';return;}
  const r=await fetch(draft,{cache:'no-store'});if(!r.ok){status.textContent='Draft not found.';return;}
  const json=await r.json();editor.value=JSON.stringify(json,null,2);status.textContent=`Loaded ${draft}`;
}
function saveFinal(){
  const payload = JSON.parse(editor.value||'{}');
  payload.status='mapped_reviewed'; delete payload.autoGenerated;
  payload.mappings=(payload.mappings||[]).map((m)=>({...m,needsReview:false}));
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=finalPath.split('/').pop();a.click();
  status.textContent=`Downloaded ${a.download}. Move to ${finalPath}`;
}
document.getElementById('loadDraft').onclick=loadDraft;document.getElementById('saveFinal').onclick=saveFinal;if(draft) loadDraft();
</script></body></html>
